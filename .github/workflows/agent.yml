name: AI Agent — Search & Queue

on:
  workflow_dispatch:          # manual trigger only (re-enable schedule when ready for production)

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Agent
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python src/agent.py

      - name: Trigger Engine workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: agent-done
